name: 사업공고 자동 크롤링

on:
  schedule:
    # 매시간 정각에 실행 (UTC/KST 상관없이 매시간 0분에 실행되므로 시간대 계산 불필요)
    - cron: "0 * * * *"
  workflow_dispatch:  # GitHub 화면에서 수동으로 "지금 실행" 버튼도 누를 수 있게 함

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: git 사용자 정보 설정
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: 크롤링 실행 (git pull/push 포함)
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python crawling.py --site all --start 1 --end 3
