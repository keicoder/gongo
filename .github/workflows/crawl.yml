name: 사업공고 자동 크롤링

on:
  schedule:
    # 매일 한국시간(KST) 오전 8시 실행 (UTC 기준 전날 23:00 = KST -9시간)
    - cron: "0 23 * * *"
  workflow_dispatch:  # GitHub 화면에서 수동으로 "지금 실행" 버튼도 누를 수 있게 함

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 크롤링 실행
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python crawling.py --site all --start 1 --end 3

      - name: 변경된 DB 파일 저장소에 반영
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add crawling_db.csv
          git diff --cached --quiet || git commit -m "자동 크롤링 결과 업데이트"
          git push
